<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sample Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title mb-4">Contact Us</h2>
                        
                        <!-- FormRelay Submission Form -->
                        <form action="http://localhost:8080/api/form" method="POST" enctype="multipart/form-data">
                            <!-- Required: form_id -->
                            <input type="hidden" name="form_id" value="contact-form-v1">
                            
                            <!-- Optional: redirect after submission -->
                            <!-- <input type="hidden" name="_next" value="https://example.com/thanks"> -->

                            <!-- Optional: Honeypot for spam protection -->
                            <input type="text" name="_honeypot" style="display:none">

                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Subject</label>
                                <select name="subject" class="form-select">
                                    <option value="inquiry">General Inquiry</option>
                                    <option value="support">Technical Support</option>
                                    <option value="billing">Billing Issue</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea name="message" class="form-control" rows="4" required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Attachment (Optional)</label>
                                <input type="file" name="attachment" class="form-control">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2">Submit Form</button>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-3 text-muted small">Powered by FormRelay</p>
            </div>
        </div>
    </div>
</body>
</html>
