<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Test Form</title>
</head>
<body>
    <h1>Test Submission Form</h1>
    <form action="http://localhost:8080/api/form" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="form_id" value="test-form-id">
        <input type="hidden" name="_next" value="http://localhost:8080/static/success.html">
        
        <p>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </p>
        
        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </p>
        
        <p>
            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea>
        </p>

        <p>
            <label for="attachment">Attachment:</label>
            <input type="file" id="attachment" name="attachment">
        </p>

        <!-- Honeypot -->
        <div style="display:none;">
            <input type="text" name="_honeypot">
        </div>

        <button type="submit" id="submit-btn">Submit</button>
    </form>
</body>
</html>
